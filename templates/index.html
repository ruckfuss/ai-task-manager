<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Task Manager</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 AI Task Manager</h1>
            <p class="subtitle">Powered by Google Gemini</p>
        </header>

        <div class="add-task-form">
            <h2>Add New Task</h2>
            <input type="text" id="taskTitle" placeholder="Task title..." />
            <textarea id="taskDesc" placeholder="Description (optional)..."></textarea>
            <button onclick="addTask()" id="addBtn">
                <span id="btnText">✨ Add & Analyze with AI</span>
            </button>
        </div>

        <div class="tasks-section">
            <h2>Tasks <span id="taskCount" class="badge">0</span></h2>
            <div id="taskList" class="task-list"></div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
